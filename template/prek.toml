[[repos]]
repo = "builtin"
hooks = [
  {id = "no-commit-to-branch"},
  {id = "trailing-whitespace"},
  {id = "end-of-file-fixer"},
  {id = "check-merge-conflict"},
  {id = "check-toml"},
  {id = "check-yaml"},
  {id = "check-json"},
  {id = "check-json5"},
  {id = "detect-private-key"},
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "nix-flake-check"
name = "nix flake check"
language = "system"
entry = "nix flake check"
pass_filenames = false
types = ["nix"]

[[repos.hooks]]
id = "nixfmt"
name = "nixfmt"
language = "system"
entry = "nixfmt"
types = ["nix"]

[[repos.hooks]]
id = "statix"
name = "statix"
language = "system"
entry = "statix check"
pass_filenames = false
types = ["nix"]

[[repos.hooks]]
id = "deadnix"
name = "deadnix"
language = "system"
entry = "deadnix --fail"
types = ["nix"]

[[repos.hooks]]
id = "uv-sync"
name = "uv sync"
language = "system"
entry = "uv sync"
pass_filenames = false
files = { glob = ["pyproject.toml", "uv.lock"] }

[[repos.hooks]]
id = "ruff-check"
name = "ruff check"
language = "system"
entry = "ruff check --fix"
types = ["python"]

[[repos.hooks]]
id = "ruff-format"
name = "ruff format"
language = "system"
entry = "ruff format"
types = ["python"]

[[repos.hooks]]
id = "ty-check"
name = "ty check"
language = "system"
entry = "ty check"
pass_filenames = false
types = ["python"]

[[repos.hooks]]
id = "check-test-naming"
name = "check test naming"
language = "system"
entry = "python scripts/check_test_naming.py"
pass_filenames = false

[[repos.hooks]]
id = "pytest-unit"
name = "pytest unit tests"
language = "system"
entry = "pytest -m unit_test"
pass_filenames = false
